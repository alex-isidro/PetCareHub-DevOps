services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim

    container_name: oracle-db

    environment:
      ORACLE_PASSWORD: "OracleRoot123"
      APP_USER: "PETCARE"
      APP_USER_PASSWORD: "petcare123"

    ports:
      - "1521:1521"

    volumes:
      - oracle_data:/opt/oracle/oradata

    restart: unless-stopped

  petcare-api:
    build: .

    container_name: petcare-api

    depends_on:
      - oracle-db

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      DB_USERNAME: PETCARE
      DB_PASSWORD: petcare123

    restart: on-failure

volumes:
  oracle_data: